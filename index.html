<!DOCTYPE html>
<html lang="hu">

<head>

    <meta charset="UTF-8">

    <title>Russian Swipe</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

    <!-- ===================================== -->
    <!-- HAMBURGER -->
    <!-- ===================================== -->

    <div id="menuBtn">
        ☰
    </div>

    <!-- ===================================== -->
    <!-- MENU -->
    <!-- ===================================== -->

    <div id="menuPanel" class="hidden">

        <!-- TAB GOMBOK -->

        <div id="menuTabs">

            <button onclick="openTab('gotoTab')">
                Go to page
            </button>

            <button onclick="openTab('contentsTab')">
                Tartalomjegyzék
            </button>

        </div>

        <!-- ===================================== -->
        <!-- GO TO PAGE -->
        <!-- ===================================== -->

        <div id="gotoTab" class="menuTab">

            <div class="menu-item">

                <label>

                    Go to page

                </label>

                <input
                    id="pageInput"
                    type="number"
                    min="1">

                <button onclick="goToPage()">

                    Go

                </button>

            </div>

        </div>

        <!-- ===================================== -->
        <!-- TARTALOMJEGYZÉK -->
        <!-- ===================================== -->

        <div id="contentsTab" class="menuTab hidden">

            <div id="contentsList">

                <button onclick="jumpTo(0)">
                    1 - Alap szavak
                </button>

                <button onclick="jumpTo(932)">
                    932 - Szókártyák
                </button>

                <button onclick="jumpTo(1097)">
                    1097 - kávé 1.
                </button>

                <button onclick="jumpTo(1151)">
                    1151 - kávé 2.
                </button>

                <button onclick="jumpTo(1173)">
                    1173 - kávé 3.
                </button>

                <button onclick="jumpTo(1206)">
                    1206 - kávé 4.
                </button>

            </div>

        </div>

    </div>

    <!-- ===================================== -->
    <!-- CARD -->
    <!-- ===================================== -->

    <div id="card">

        <div id="hu"></div>

        <div id="ru"></div>

    </div>

    <!-- ===================================== -->
    <!-- COUNTER -->
    <!-- ===================================== -->

    <div id="counter"></div>

    <script src="app.js"></script>

</body>

</html>
